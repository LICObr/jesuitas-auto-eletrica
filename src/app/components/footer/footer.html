<footer class="footer">
  <div class="container">
    <div class="row g-5">
      <div class="col-lg-4">
        <div class="footer-brand">
          <img src="assets/images/ferrarilogo.png" alt="Logo" />
          <span>Jesuítas <strong>Auto Elétrica</strong></span>
        </div>
        <p class="footer-desc">
          Especialistas em elétrica automotiva em Maringá - PR. Atendemos carros, caminhões e pesados.
        </p>
      </div>

      <div class="col-lg-4">
        <h6 class="footer-heading">Contato</h6>
        <ul class="footer-links">
          <li>
            <i class="bi bi-telephone"></i>
            <span>(44) 3268-8008</span>
          </li>
          <li>
            <i class="bi bi-whatsapp"></i>
            <a [href]="whatsappUrl" target="_blank">(44) 99136-2007</a>
          </li>
          <li>
            <i class="bi bi-geo-alt"></i>
            <span>Maringá - PR, Brasil</span>
          </li>
        </ul>
      </div>

      <div class="col-lg-4">
        <h6 class="footer-heading">Localização</h6>
        <div class="map-wrapper">
          <iframe
            [src]="mapsUrl"
            width="100%"
            height="180"
            style="border:0; border-radius: 8px;"
            allowfullscreen=""
            loading="lazy"
            referrerpolicy="no-referrer-when-downgrade"
            title="Localização Jesuítas Auto Elétrica"
          ></iframe>
        </div>
      </div>
    </div>

    <div class="footer-bottom">
      <p>&copy; {{ currentYear }} Jesuítas Auto Elétrica. Todos os direitos reservados.</p>
    </div>
  </div>
</footer>

<a
  [href]="whatsappUrl"
  target="_blank"
  class="whatsapp-fab"
  aria-label="Fale conosco no WhatsApp"
>
  <i class="bi bi-whatsapp"></i>
</a>
