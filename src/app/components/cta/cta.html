<section class="cta-section">
  <div class="cta-glow"></div>
  <div class="container text-center">
    <p class="eyebrow" animateOnScroll>Pronto para começar?</p>
    <h2 animateOnScroll [delay]="100">
      Agende seu atendimento<br>
      <span class="highlight">diretamente pelo WhatsApp</span>
    </h2>
    <p class="cta-desc" animateOnScroll [delay]="200">
      Resposta rápida, diagnóstico preciso e atendimento de qualidade para o seu veículo.
    </p>
    <a [href]="whatsappUrl" target="_blank" class="cta-btn" animateOnScroll [delay]="300">
      <i class="bi bi-whatsapp"></i>
      Falar com a equipe agora
    </a>
  </div>
</section>
