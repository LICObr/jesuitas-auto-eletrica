<section id="services" class="services-section">
  <div class="container">
    <div class="section-header text-center">
      <p class="eyebrow" animateOnScroll>O que fazemos</p>
      <h2 class="section-title" animateOnScroll [delay]="100">Nossos Serviços</h2>
      <p class="section-subtitle" animateOnScroll [delay]="180">Soluções completas em elétrica automotiva para o seu veículo</p>
    </div>

    <div class="row g-4 justify-content-center">
      @for (service of services; track service.title; let i = $index) {
        <div class="col-md-6 col-lg-4" animateOnScroll [delay]="i * 80">
          <div class="service-card" spotlight>
            <div class="service-icon">
              <i [class]="'bi ' + service.icon"></i>
            </div>
            <h5 class="service-title">{{ service.title }}</h5>
            <p class="service-description">{{ service.description }}</p>
          </div>
        </div>
      }
    </div>
  </div>
</section>
