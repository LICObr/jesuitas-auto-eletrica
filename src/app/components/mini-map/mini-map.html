<div class="mini-map-wrapper">
  <div class="mini-map-label">
    <i class="bi bi-geo-alt-fill"></i>
    <span>Nossa localização</span>
  </div>
  <iframe
    [src]="mapsUrl"
    width="100%"
    height="100%"
    style="border:0;"
    allowfullscreen=""
    loading="lazy"
    referrerpolicy="no-referrer-when-downgrade"
    title="Localização Jesuítas Auto Elétrica"
  ></iframe>
</div>
