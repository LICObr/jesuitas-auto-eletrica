<section id="gallery" class="gallery-section">
  <div class="container">
    <div class="section-header text-center">
      <p class="eyebrow" animateOnScroll>Especialidades</p>
      <h2 class="section-title" animateOnScroll [delay]="100">Nossas Especialidades</h2>
      <p class="section-subtitle" animateOnScroll [delay]="180">Trabalhamos com os principais componentes do sistema elétrico automotivo</p>
    </div>

    <div class="row g-4">
      @for (item of items; track item.alt; let i = $index) {
        <div class="col-md-4" animateOnScroll [delay]="i * 120">
          <div class="gallery-card">
            <div class="gallery-image-wrapper">
              <img [src]="item.src" [alt]="item.alt" class="gallery-image" />
            </div>
            <div class="gallery-label">
              <span>{{ item.label }}</span>
            </div>
          </div>
        </div>
      }
    </div>
  </div>
</section>
