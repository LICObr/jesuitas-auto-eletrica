<section id="home" class="hero">
  <div class="hero-bg"></div>

  <ngx-particles
    [id]="particlesId"
    [options]="particlesOptions"
    class="particles-canvas"
  ></ngx-particles>

  <div class="hero-content container">
    <p class="hero-eyebrow">Especialistas em Elétrica Automotiva</p>
    <h1>
      Excelência que<br>
      <span class="highlight">faz a diferença</span>
    </h1>
    <p class="hero-description">
      Diagnóstico preciso, peças de qualidade e atendimento ágil para carros e caminhões.
      Maringá - PR.
    </p>
    <div class="hero-actions">
      <a href="#services" class="btn-primary-custom">Ver serviços</a>
      <a
        href="https://wa.me/5544991362007?text=Ol%C3%A1!%20Gostaria%20de%20mais%20informa%C3%A7%C3%B5es."
        target="_blank"
        class="btn-outline-custom"
      >
        <i class="bi bi-whatsapp"></i>
        Fale conosco
      </a>
    </div>
  </div>

  <div class="scroll-indicator">
    <div class="scroll-line"></div>
  </div>
</section>
